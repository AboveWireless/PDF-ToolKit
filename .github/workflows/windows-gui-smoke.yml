name: windows-gui-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]
      - name: Run test suite
        run: python -m pytest
      - name: Build GUI package
        run: powershell -ExecutionPolicy Bypass -File scripts/build_gui.ps1
      - name: Smoke start GUI
        run: |
          $process = Start-Process -FilePath ".\dist\pdf-toolkit-gui\pdf-toolkit-gui.exe" -PassThru
          Start-Sleep -Seconds 5
          Stop-Process -Id $process.Id
